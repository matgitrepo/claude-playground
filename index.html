<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e2e2e2;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a0c4ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #ff6b6b;
    }

    .cell.o {
      color: #51cf66;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(160, 196, 255, 0.35);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #a0c4ff;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #1a4a8a;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    #score .score-item:nth-child(1) .score-value { color: #ff6b6b; }
    #score .score-item:nth-child(2) .score-value { color: #888; }
    #score .score-item:nth-child(3) .score-value { color: #51cf66; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-item">
      <div class="score-label">X</div>
      <div class="score-value" id="score-x">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Draws</div>
      <div class="score-value" id="score-draw">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">O</div>
      <div class="score-value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board, current, gameOver, score;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      score = score ?? { X: 0, O: 0, draw: 0 };

      document.querySelectorAll('.cell').forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      setStatus(`${current}'s turn`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScoreDisplay() {
      document.getElementById('score-x').textContent = score.X;
      document.getElementById('score-o').textContent = score.O;
      document.getElementById('score-draw').textContent = score.draw;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || cell.classList.contains('taken')) return;

      const i = parseInt(cell.dataset.index);
      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx =>
            document.querySelector(`[data-index="${idx}"]`).classList.add('win')
          );
          score[result.winner]++;
          updateScoreDisplay();
          setStatus(`${result.winner} wins!`);
        } else {
          score.draw++;
          updateScoreDisplay();
          setStatus("It's a draw!");
        }
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    });

    document.getElementById('restart').addEventListener('click', init);

    score = { X: 0, O: 0, draw: 0 };
    init();
  </script>
</body>
</html>
