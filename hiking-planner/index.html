<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiking Weather Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1f1a;
      color: #e8ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #a8c5a0;
    }

    header p {
      margin-top: 8px;
      color: #7a9478;
      font-size: 0.95rem;
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .mode-btn {
      background: #252b25;
      border: 1px solid #2e362e;
      border-radius: 20px;
      padding: 8px 22px;
      color: #7a9478;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #3a5a36;
      border-color: #5a8f52;
      color: #c8dcc8;
    }

    .card {
      background: #252b25;
      border: 1px solid #2e362e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #1a1f1a;
      border: 1px solid #3a453a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e8ede8;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #6a9e62; }
    input[type="text"]::placeholder { color: #4a5a4a; }

    button#checkBtn {
      background: #5a8f52;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button#checkBtn:hover { background: #6aac60; }
    button#checkBtn:disabled { background: #3a5a36; cursor: not-allowed; }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #2e1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 10px;
      color: #e88080;
      font-size: 0.9rem;
      display: none;
    }

    .spinner {
      display: none;
      margin-top: 24px;
      text-align: center;
      color: #7a9478;
      font-size: 0.9rem;
    }

    .spinner::before {
      content: "";
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #3a553a;
      border-top-color: #6aac60;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .config-notice {
      margin-top: 20px;
      padding: 12px 16px;
      background: #1a1f2e;
      border: 1px solid #2a2a5a;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #8888cc;
      display: none;
    }

    /* ─── Results ──────────────────────────────────────────── */

    .results-area {
      display: none;
      width: 100%;
      max-width: 480px;
      margin-top: 4px;
    }

    .location-label {
      text-align: center;
      font-size: 0.8rem;
      color: #5a7a5a;
      margin: 16px 0 12px;
    }

    .day-card {
      background: #252b25;
      border: 1px solid #2e362e;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 12px;
    }

    .day-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #7a9478;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      text-align: center;
    }

    .verdict {
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      margin-bottom: 16px;
    }

    .verdict.great    { background: #1a2e1a; border: 1px solid #3a6e32; }
    .verdict.soso     { background: #2a2410; border: 1px solid #6e5a20; }
    .verdict.stayhome { background: #2a1a1a; border: 1px solid #6e2a2a; }

    .verdict-icon  { font-size: 2.5rem; margin-bottom: 8px; }
    .verdict-label { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }

    .verdict.great .verdict-label    { color: #7ada6a; }
    .verdict.soso .verdict-label     { color: #dab86a; }
    .verdict.stayhome .verdict-label { color: #da6a6a; }

    .explanation {
      margin-top: 12px;
      font-size: 0.92rem;
      color: #b0c4b0;
      line-height: 1.6;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .weather-stat {
      background: #1a1f1a;
      border: 1px solid #2e362e;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .weather-stat .label {
      font-size: 0.75rem;
      color: #5a7a5a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .weather-stat .value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #c8dcc8;
    }

    /* ─── Trails ───────────────────────────────────────────── */

    .trails-card {
      background: #252b25;
      border: 1px solid #2e362e;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 12px;
    }

    .trails-header {
      font-size: 0.78rem;
      font-weight: 600;
      color: #7a9478;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .trail-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid #2e362e;
      font-size: 0.88rem;
    }

    .trail-item:last-child { border-bottom: none; }
    .trail-name { color: #c8dcc8; }
    .trail-meta { color: #5a7a5a; font-size: 0.78rem; margin-left: 8px; white-space: nowrap; }

    .trails-status {
      color: #5a7a5a;
      font-size: 0.88rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>Should I go hiking?</h1>
    <p>Enter your city and get a hiking forecast</p>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnTomorrow" onclick="setMode('tomorrow')">Tomorrow</button>
    <button class="mode-btn" id="btnWeekend" onclick="setMode('weekend')">This Weekend</button>
  </div>

  <div class="card">
    <div class="input-row">
      <input type="text" id="cityInput" placeholder="e.g. Kraków, Warsaw, London" />
      <button id="checkBtn" onclick="checkWeather()">Check</button>
    </div>
    <div class="error" id="errorBox"></div>
    <div class="spinner" id="spinner"><span id="spinnerText">Checking weather...</span></div>
    <div class="config-notice" id="configNotice">
      Worker URL not configured. Open index.html and update <code>CONFIG.WORKER_URL</code>.
    </div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="location-label" id="locationLabel"></div>
    <div id="dayResults"></div>
    <div class="trails-card" id="trailsCard" style="display:none">
      <div class="trails-header">Nearby Hiking Trails</div>
      <div id="trailsList"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      WORKER_URL: "https://hiking-planner-proxy.claude-playground.workers.dev"
    }

    const WMO_CODES = {
      0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
      45: "Fog", 48: "Icy fog",
      51: "Light drizzle", 53: "Drizzle", 55: "Heavy drizzle",
      61: "Light rain", 63: "Rain", 65: "Heavy rain",
      71: "Light snow", 73: "Snow", 75: "Heavy snow",
      80: "Rain showers", 81: "Heavy showers", 82: "Violent showers",
      95: "Thunderstorm", 96: "Thunderstorm + hail", 99: "Thunderstorm + hail"
    }

    let currentMode = 'tomorrow'

    function setMode(mode) {
      currentMode = mode
      document.getElementById('btnTomorrow').classList.toggle('active', mode === 'tomorrow')
      document.getElementById('btnWeekend').classList.toggle('active', mode === 'weekend')
      document.getElementById('resultsArea').style.display = 'none'
      clearError()
    }

    document.getElementById("cityInput").addEventListener("keydown", e => {
      if (e.key === "Enter") checkWeather()
    })

    function showError(msg) {
      const box = document.getElementById("errorBox")
      box.textContent = msg
      box.style.display = "block"
    }

    function clearError() {
      document.getElementById("errorBox").style.display = "none"
    }

    function getTomorrowDate() {
      const d = new Date()
      d.setDate(d.getDate() + 1)
      return d.toISOString().split("T")[0]
    }

    function getWeekendDates() {
      const today = new Date()
      const day = today.getDay() // 0=Sun, 6=Sat
      const daysUntilSat = day === 6 ? 0 : day === 0 ? 6 : 6 - day
      const sat = new Date(today)
      sat.setDate(today.getDate() + daysUntilSat)
      const sun = new Date(sat)
      sun.setDate(sat.getDate() + 1)
      return [sat.toISOString().split("T")[0], sun.toISOString().split("T")[0]]
    }

    function formatDateLabel(dateStr) {
      const d = new Date(dateStr + "T12:00:00")
      return d.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })
    }

    async function checkWeather() {
      const city = document.getElementById("cityInput").value.trim()
      if (!city) return

      if (CONFIG.WORKER_URL.includes("YOUR_WORKER")) {
        document.getElementById("configNotice").style.display = "block"
        return
      }

      clearError()
      document.getElementById("resultsArea").style.display = "none"
      document.getElementById("trailsCard").style.display = "none"
      document.getElementById("spinner").style.display = "block"
      document.getElementById("checkBtn").disabled = true

      try {
        // Step 1: Geocode
        document.getElementById("spinnerText").textContent = "Finding city..."
        const geoRes = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`,
          { headers: { "Accept-Language": "en" } }
        ).catch(e => { throw new Error(`Could not look up city — ${e.message}`) })
        if (!geoRes.ok) throw new Error(`Geocoding failed (${geoRes.status})`)

        const geo = await geoRes.json()
        if (!geo.length) throw new Error(`City "${city}" not found. Try a different spelling.`)
        const { lat, lon, display_name } = geo[0]
        const shortName = display_name.split(",").slice(0, 2).join(",")

        // Step 2: Fetch weather
        document.getElementById("spinnerText").textContent = "Fetching weather..."
        const dates = currentMode === 'tomorrow' ? [getTomorrowDate()] : getWeekendDates()
        const weatherUrl = `https://api.open-meteo.com/v1/forecast` +
          `?latitude=${lat}&longitude=${lon}` +
          `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,` +
          `precipitation_probability_max,wind_speed_10m_max,cloud_cover_mean,weathercode` +
          `&timezone=auto&start_date=${dates[0]}&end_date=${dates[dates.length - 1]}`

        const weatherRes = await fetch(weatherUrl)
          .catch(e => { throw new Error(`Could not fetch weather — ${e.message}`) })
        if (!weatherRes.ok) throw new Error(`Weather API error ${weatherRes.status}`)
        const weather = await weatherRes.json()
        if (!weather.daily) throw new Error("Weather data unavailable for this location")

        const d = weather.daily
        const days = dates.map((date, i) => ({
          date,
          tempMax:   Math.round(d.temperature_2m_max[i]),
          tempMin:   Math.round(d.temperature_2m_min[i]),
          rain:      d.precipitation_sum[i],
          rainProb:  d.precipitation_probability_max[i],
          wind:      Math.round(d.wind_speed_10m_max[i]),
          cloud:     Math.round(d.cloud_cover_mean[i]),
          condition: WMO_CODES[d.weathercode[i]] || "Unknown"
        }))

        // Step 3: AI verdicts
        document.getElementById("spinnerText").textContent = "Asking AI..."
        const verdicts = await getAIVerdicts(shortName, days)

        // Render verdict immediately; trails load in background
        renderDays(days, verdicts, shortName)

        // Step 4: Trails load in background after verdict is shown
        document.getElementById("trailsCard").style.display = "block"
        document.getElementById("trailsList").innerHTML = '<div class="trails-status">Searching for nearby trails...</div>'
        fetchTrails(lat, lon)
          .then(trails => renderTrails(trails))
          .catch(() => { document.getElementById("trailsCard").style.display = "none" })

      } catch (err) {
        showError(err.message || "Something went wrong. Please try again.")
      } finally {
        document.getElementById("spinner").style.display = "none"
        document.getElementById("checkBtn").disabled = false
      }
    }

    async function getAIVerdicts(locationName, days) {
      let prompt, maxTokens

      if (days.length === 1) {
        const day = days[0]
        prompt = `Tomorrow's hiking weather forecast for ${locationName}:
- Temperature: ${day.tempMin}°C to ${day.tempMax}°C
- Rain probability: ${day.rainProb}%
- Precipitation: ${day.rain} mm
- Wind speed: ${day.wind} km/h
- Cloud cover: ${day.cloud}%
- Conditions: ${day.condition}

Evaluate if this is good for hiking. Respond with valid JSON only:
{"verdict": "GREAT" | "SO-SO" | "STAY HOME", "explanation": "2-3 sentences for a hiker"}`
        maxTokens = 200
      } else {
        const parts = days.map(day => `${formatDateLabel(day.date)}:
- Temperature: ${day.tempMin}°C to ${day.tempMax}°C
- Rain probability: ${day.rainProb}%
- Precipitation: ${day.rain} mm
- Wind speed: ${day.wind} km/h
- Cloud cover: ${day.cloud}%
- Conditions: ${day.condition}`).join("\n\n")

        prompt = `Weekend hiking forecast for ${locationName}:\n\n${parts}\n\nFor each day, evaluate hiking suitability. Respond with a valid JSON array only:\n[{"date":"${days[0].date}","verdict":"GREAT"|"SO-SO"|"STAY HOME","explanation":"2-3 sentences"},{"date":"${days[1].date}","verdict":"...","explanation":"..."}]`
        maxTokens = 400
      }

      const aiRes = await fetch(CONFIG.WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            { role: "system", content: "You are a concise hiking weather advisor. Always respond with valid JSON only, no markdown, no extra text." },
            { role: "user", content: prompt }
          ],
          max_tokens: maxTokens,
          temperature: 0.4
        })
      }).catch(e => { throw new Error(`AI request failed — ${e.message}`) })

      if (!aiRes.ok) {
        const text = await aiRes.text()
        throw new Error(`Worker returned ${aiRes.status}: ${text}`)
      }

      const aiResponse = await aiRes.json()
      const raw = aiResponse.choices?.[0]?.message?.content?.trim()
      if (!raw) throw new Error("No response from AI. Check your OpenAI API key.")

      let parsed
      try { parsed = JSON.parse(raw) }
      catch { throw new Error(`Unexpected AI response: ${raw}`) }

      return Array.isArray(parsed) ? parsed : [parsed]
    }

    async function fetchTrails(lat, lon) {
      const query = `[out:json][timeout:20];relation["route"="hiking"](around:25000,${lat},${lon});out 10 tags;`
      const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`
      const controller = new AbortController()
      const timeout = setTimeout(() => controller.abort(), 9000)
      try {
        const res = await fetch(url, { signal: controller.signal })
        if (!res.ok) throw new Error(`Overpass ${res.status}`)
        const data = await res.json()
        return (data.elements || [])
          .filter(el => el.tags?.name)
          .slice(0, 6)
          .map(el => ({
            name: el.tags.name,
            distance: el.tags.distance || el.tags["osmc:distance"] || null,
            network: el.tags.network || null
          }))
      } finally {
        clearTimeout(timeout)
      }
    }

    function buildDayHTML(day, v) {
      const cls   = v?.verdict === "GREAT" ? "great" : v?.verdict === "SO-SO" ? "soso" : "stayhome"
      const icon  = v?.verdict === "GREAT" ? "⛰️" : v?.verdict === "SO-SO" ? "🌥️" : "🌧️"
      const label = v?.verdict === "GREAT" ? "Great weather for hiking!"
                  : v?.verdict === "SO-SO" ? "So-so — could go either way"
                  : "Better stay at home"
      return `
        <div class="verdict ${v ? cls : ''}">
          <div class="verdict-icon">${v ? icon : "…"}</div>
          <div class="verdict-label">${v ? label : "No AI verdict"}</div>
          ${v?.explanation ? `<div class="explanation">${v.explanation}</div>` : ""}
        </div>
        <div class="weather-grid">
          <div class="weather-stat">
            <div class="label">Temperature</div>
            <div class="value">${day.tempMin}°C – ${day.tempMax}°C</div>
          </div>
          <div class="weather-stat">
            <div class="label">Rain chance</div>
            <div class="value">${day.rainProb}% (${day.rain} mm)</div>
          </div>
          <div class="weather-stat">
            <div class="label">Wind speed</div>
            <div class="value">${day.wind} km/h</div>
          </div>
          <div class="weather-stat">
            <div class="label">Cloud cover</div>
            <div class="value">${day.cloud}%</div>
          </div>
        </div>`
    }

    function renderDays(days, verdicts, shortName) {
      document.getElementById("locationLabel").textContent =
        currentMode === 'tomorrow' ? `Tomorrow in ${shortName}` : `Weekend forecast for ${shortName}`

      const container = document.getElementById("dayResults")
      if (currentMode === 'tomorrow') {
        container.innerHTML = `<div class="day-card">${buildDayHTML(days[0], verdicts[0])}</div>`
      } else {
        container.innerHTML = days.map((day, i) => {
          const v = verdicts?.find(v => v.date === day.date) ?? verdicts?.[i] ?? null
          return `<div class="day-card">
            <div class="day-label">${formatDateLabel(day.date)}</div>
            ${buildDayHTML(day, v)}
          </div>`
        }).join("")
      }
      document.getElementById("resultsArea").style.display = "block"
    }

    function renderTrails(trails) {
      const card = document.getElementById("trailsCard")
      const list = document.getElementById("trailsList")
      if (!trails?.length) {
        card.style.display = "none"
        return
      }
      list.innerHTML = trails.map(t => `
        <div class="trail-item">
          <span class="trail-name">${t.name}</span>
          <span class="trail-meta">${t.distance ? t.distance + " km" : t.network || ""}</span>
        </div>`).join("")
    }
  </script>

</body>
</html>
