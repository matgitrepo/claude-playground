name = "hiking-planner-proxy"
main = "worker.js"
compatibility_date = "2024-09-23"

[vars]
# Comma-separated list of allowed origins.
# Add your GitHub Pages URL here once you have it.
# For local testing, add "http://localhost" or use * (not recommended for production).
ALLOWED_ORIGIN = "http://localhost,http://127.0.0.1"

# OPENAI_API_KEY is stored as a secret — never put it here.
# Set it by running: wrangler secret put OPENAI_API_KEY
