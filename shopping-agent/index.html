<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Deal Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 2rem;
    }

    /* --- Search bar --- */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      max-width: 700px;
      margin: 0 auto 1.5rem;
      flex-wrap: wrap;
    }

    .search-bar input[type="text"] {
      flex: 1 1 250px;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input[type="text"]:focus {
      border-color: #555;
    }

    .search-bar select {
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
    }

    .search-bar button {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #e0e0e0;
      color: #0f0f0f;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-bar button:hover { background: #fff; }
    .search-bar button:disabled { background: #444; color: #777; cursor: not-allowed; }

    /* --- Warning banner --- */
    #warnings {
      max-width: 900px;
      margin: 0 auto 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .warning {
      background: #2a1f00;
      border: 1px solid #554400;
      color: #ffcc44;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    /* --- Status messages --- */
    #status {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    /* --- Results grid --- */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* --- Product card --- */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: #222;
    }

    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 2rem;
    }

    .card-body {
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .card-meta {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-zalando { background: #ff6900; color: #fff; }
    .badge-asos    { background: #2e3192; color: #fff; }
    .badge-vinted  { background: #1a7a4a; color: #fff; }

    .badge-used  { background: #333; color: #aaa; }
    .badge-new   { background: #1a3a1a; color: #6dbf6d; }

    .card-title {
      font-size: 0.875rem;
      color: #ccc;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-size {
      font-size: 0.8rem;
      color: #777;
    }

    .card-pricing {
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid #222;
    }

    .card-effective-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
    }

    .card-price-breakdown {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.15rem;
    }

    .card-link {
      display: block;
      margin-top: 0.6rem;
      text-align: center;
      padding: 0.45rem;
      border-radius: 6px;
      border: 1px solid #333;
      color: #aaa;
      text-decoration: none;
      font-size: 0.8rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .card-link:hover { border-color: #666; color: #fff; }

    /* --- Empty state --- */
    #empty {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
      padding: 3rem 0;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Fashion Deal Finder</h1>
  <p class="subtitle">Searches Zalando, ASOS &amp; Vinted in parallel — sorted by lowest effective price</p>

  <div class="search-bar">
    <input type="text" id="query" placeholder="e.g. Nike Air Force 1" />
    <select id="size">
      <option value="">Any size</option>
      <option value="XS">XS</option>
      <option value="S">S</option>
      <option value="M">M</option>
      <option value="L">L</option>
      <option value="XL">XL</option>
      <option value="XXL">XXL</option>
      <option value="36">EU 36</option>
      <option value="37">EU 37</option>
      <option value="38">EU 38</option>
      <option value="39">EU 39</option>
      <option value="40">EU 40</option>
      <option value="41">EU 41</option>
      <option value="42">EU 42</option>
      <option value="43">EU 43</option>
      <option value="44">EU 44</option>
      <option value="45">EU 45</option>
      <option value="46">EU 46</option>
    </select>
    <button id="searchBtn" onclick="runSearch()">Search</button>
  </div>

  <div id="warnings"></div>
  <div id="status"></div>
  <div id="results"></div>
  <div id="empty">No results found. Try a different search term or size.</div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIG — paste your API keys here
    // ─────────────────────────────────────────────
    const CONFIG = {
      ZALANDO_CLIENT_ID: 'YOUR_ZALANDO_CLIENT_ID',
      RAPIDAPI_KEY:      'YOUR_RAPIDAPI_KEY',

      // Hardcoded fallback exchange rates (EUR base)
      FX: {
        GBP: 1.17,   // 1 GBP = 1.17 EUR
        PLN: 0.233,  // 1 PLN = 0.233 EUR
      }
    };

    // ─────────────────────────────────────────────
    // SIZE NORMALISATION MAPS
    // ─────────────────────────────────────────────

    // ASOS uses UK clothing sizes — map to EU label
    const ASOS_UK_TO_EU = {
      '4': 'XS', '6': 'XS', '8': 'S', '10': 'M',
      '12': 'L', '14': 'XL', '16': 'XXL', '18': 'XXL'
    };

    // Vinted size IDs for clothing (approximate — verify against Vinted API)
    const VINTED_SIZE_IDS = {
      'XS':  206, 'S':   207, 'M':   208,
      'L':   209, 'XL':  210, 'XXL': 211,
      '36':  1346, '37': 1347, '38': 1348,
      '39':  1349, '40': 1350, '41': 1351,
      '42':  1352, '43': 1353, '44': 1354,
      '45':  1355, '46': 1356
    };

    function toEUR(amount, currency) {
      const rate = CONFIG.FX[currency];
      return rate ? Math.round(amount * rate * 100) / 100 : amount;
    }

    function normaliseSize(raw, source) {
      if (!raw) return null;
      const str = String(raw).trim();
      if (source === 'asos') return ASOS_UK_TO_EU[str] || str;
      return str.toUpperCase();
    }

    // ─────────────────────────────────────────────
    // ZALANDO MODULE
    // ─────────────────────────────────────────────
    async function fetchZalando(query, size) {
      const params = new URLSearchParams({ q: query, pageSize: 20 });
      if (size) params.set('size', size);

      const res = await fetch(
        `https://api.zalando.com/articles?${params}`,
        { headers: { 'X-Client-Id': CONFIG.ZALANDO_CLIENT_ID } }
      );
      if (!res.ok) throw new Error(`Zalando ${res.status}`);
      const data = await res.json();

      return (data.content || []).flatMap(article =>
        (article.units || []).map(unit => {
          const price = article.units?.[0]?.price?.current?.value ?? 0;
          return {
            source: 'zalando',
            title: article.name,
            price: price,
            shipping: 0,
            effectivePrice: price,
            size: unit.size || null,
            condition: 'new',
            url: article.url,
            image: article.media?.images?.[0]?.largeSrc || null
          };
        })
      );
    }

    // ─────────────────────────────────────────────
    // ASOS MODULE (via RapidAPI — Axesso)
    // ─────────────────────────────────────────────
    async function fetchAsos(query, size) {
      const params = new URLSearchParams({
        keyword: query,
        offset: '0',
        limit: '20',
        store: 'com',
        currency: 'GBP'
      });

      const res = await fetch(
        `https://axesso-asos-data-service.p.rapidapi.com/asos/asos-search-by-keyword?${params}`,
        {
          headers: {
            'X-RapidAPI-Key': CONFIG.RAPIDAPI_KEY,
            'X-RapidAPI-Host': 'axesso-asos-data-service.p.rapidapi.com'
          }
        }
      );
      if (!res.ok) throw new Error(`ASOS ${res.status}`);
      const data = await res.json();

      const products = data.searchResults || data.products || [];
      return products.map(p => {
        const priceGBP = p.price?.current?.value ?? p.currentPrice ?? 0;
        const priceEUR = toEUR(priceGBP, 'GBP');
        const rawSize = p.size || null;
        const normSize = normaliseSize(rawSize, 'asos');

        return {
          source: 'asos',
          title: p.name || p.productDescription || 'ASOS item',
          price: priceEUR,
          shipping: 0,
          effectivePrice: priceEUR,
          size: normSize,
          condition: 'new',
          url: p.url ? `https://www.asos.com${p.url}` : '#',
          image: p.imageUrl || null
        };
      }).filter(p => !size || !p.size || p.size === size.toUpperCase());
    }

    // ─────────────────────────────────────────────
    // VINTED MODULE (via CORS proxy)
    // ─────────────────────────────────────────────
    async function fetchVinted(query, size) {
      const vintedParams = new URLSearchParams({ search_text: query, per_page: 20 });
      if (size) {
        const sizeId = VINTED_SIZE_IDS[size.toUpperCase()];
        if (sizeId) vintedParams.append('size_ids[]', sizeId);
      }

      const vintedUrl = `https://www.vinted.pl/api/v2/catalog/items?${vintedParams}`;
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(vintedUrl)}`;

      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`Vinted proxy ${res.status}`);
      const outer = await res.json();
      const data = JSON.parse(outer.contents);

      return (data.items || []).map(item => {
        const pricePLN = parseFloat(item.price) || 0;
        const priceEUR = toEUR(pricePLN, 'PLN');
        const shippingPLN = parseFloat(item.service_fee) || 0;
        const shippingEUR = toEUR(shippingPLN, 'PLN');

        return {
          source: 'vinted',
          title: item.title,
          price: priceEUR,
          shipping: shippingEUR,
          effectivePrice: Math.round((priceEUR + shippingEUR) * 100) / 100,
          size: item.size_title || null,
          condition: 'used',
          url: item.url || '#',
          image: item.photo?.url || item.photo?.full_size_url || null
        };
      });
    }

    // ─────────────────────────────────────────────
    // MERGE, SORT & RENDER
    // ─────────────────────────────────────────────
    function renderCard(p) {
      const sourceLabel = { zalando: 'Zalando', asos: 'ASOS', vinted: 'Vinted' }[p.source];
      const condLabel   = p.condition === 'used' ? 'Used' : 'New';

      const imgHtml = p.image
        ? `<img class="card-image" src="${p.image}" alt="${escHtml(p.title)}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="card-image-placeholder">👕</div>`;

      const sizeHtml = p.size ? `<span class="card-size">Size: ${escHtml(p.size)}</span>` : '';

      const breakdown = p.shipping > 0
        ? `€${p.price.toFixed(2)} + €${p.shipping.toFixed(2)} shipping`
        : `€${p.price.toFixed(2)} · free shipping`;

      return `
        <div class="card">
          ${imgHtml}
          <div class="card-body">
            <div class="card-meta">
              <span class="badge badge-${p.source}">${sourceLabel}</span>
              <span class="badge badge-${p.condition}">${condLabel}</span>
            </div>
            <div class="card-title">${escHtml(p.title)}</div>
            ${sizeHtml}
            <div class="card-pricing">
              <div class="card-effective-price">€${p.effectivePrice.toFixed(2)}</div>
              <div class="card-price-breakdown">${breakdown}</div>
            </div>
            <a class="card-link" href="${p.url}" target="_blank" rel="noopener noreferrer">View →</a>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─────────────────────────────────────────────
    // MAIN SEARCH ORCHESTRATOR
    // ─────────────────────────────────────────────
    async function runSearch() {
      const query = document.getElementById('query').value.trim();
      const size  = document.getElementById('size').value;

      if (!query) {
        document.getElementById('query').focus();
        return;
      }

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      document.getElementById('warnings').innerHTML = '';
      document.getElementById('results').innerHTML = '';
      document.getElementById('empty').style.display = 'none';
      setStatus('Searching Zalando, ASOS and Vinted…');

      const sources = [
        { name: 'Zalando', fn: () => fetchZalando(query, size) },
        { name: 'ASOS',    fn: () => fetchAsos(query, size) },
        { name: 'Vinted',  fn: () => fetchVinted(query, size) },
      ];

      const settled = await Promise.allSettled(sources.map(s => s.fn()));

      const warnings = [];
      let allResults = [];

      settled.forEach((result, i) => {
        if (result.status === 'fulfilled') {
          allResults = allResults.concat(result.value);
        } else {
          warnings.push(`${sources[i].name} failed to load: ${result.reason?.message || 'unknown error'}`);
        }
      });

      // Filter by size if selected
      if (size) {
        allResults = allResults.filter(p =>
          !p.size || p.size.toUpperCase() === size.toUpperCase()
        );
      }

      // Sort by effective price ascending
      allResults.sort((a, b) => a.effectivePrice - b.effectivePrice);

      // Render warnings
      if (warnings.length) {
        document.getElementById('warnings').innerHTML = warnings
          .map(w => `<div class="warning">⚠ ${escHtml(w)}</div>`)
          .join('');
      }

      // Render results
      if (allResults.length === 0) {
        setStatus('');
        document.getElementById('empty').style.display = 'block';
      } else {
        setStatus(`${allResults.length} result${allResults.length !== 1 ? 's' : ''} found — sorted by lowest price`);
        document.getElementById('results').innerHTML = allResults.map(renderCard).join('');
      }

      btn.disabled = false;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    // Allow pressing Enter in the search box
    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') runSearch();
    });
  </script>
</body>
</html>
